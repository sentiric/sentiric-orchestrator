<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTIRIC | NEXUS ORCHESTRATOR</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💠</text></svg>">
    <link rel="stylesheet" href="/ui/css/theme.css">
    <link rel="stylesheet" href="/ui/css/layout.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>
    <div class="app-wrapper">
        
        <header class="top-bar mobile-header mobile-only">
            <div style="display:flex; align-items:center; gap:10px;">
                <button id="mobile-menu-btn" class="icon-btn" style="font-size:20px;">☰</button>
                <div class="brand-logo" style="font-size:20px;">💠</div>
                <div style="font-weight:900; letter-spacing:1px; font-size:14px;">NEXUS <span id="v-badge-mobile" style="color:var(--accent-blue); font-size:10px;">v-.--</span></div>
            </div>
            <div id="conn-status-mobile" class="conn-status offline">● OFFLINE</div>
        </header>

        <aside class="sidebar" id="sidebar">
            <div class="brand-area desktop-only">
                <div class="brand-logo">💠</div>
                <div class="brand-text">
                    <h1>NEXUS</h1>
                    <span>SRE GOVERNOR <span id="v-badge-desktop" style="color:var(--accent-blue)">v-.--</span></span>
                </div>
            </div>

            <div class="cluster-nodes-area">
                <div class="area-title">CLUSTER NODES</div>
                <div id="cluster-list" class="node-list"></div>
            </div>

            <div class="sidebar-footer">
                <div class="area-title" style="padding:0 0 8px 0;">SELECTED NODE</div>
                <div style="font-family:'JetBrains Mono'; font-size:12px; font-weight:700; color:#fff; margin-bottom:15px; word-break: break-all;" id="host-name">WAITING...</div>
                
                <div class="mini-stats">
                    <span class="lbl">CPU</span>
                    <div class="mini-stat-bar"><div id="host-cpu-bar" class="mini-stat-fill cpu" style="width:0%"></div></div>
                    <span class="val" id="host-cpu-val">0%</span>
                </div>
                <div class="mini-stats">
                    <span class="lbl">RAM</span>
                    <div class="mini-stat-bar"><div id="host-ram-bar" class="mini-stat-fill ram" style="width:0%"></div></div>
                    <span class="val" id="host-ram-val">0 GB</span>
                </div>
                <div class="mini-stats">
                    <span class="lbl">DSK</span>
                    <div class="mini-stat-bar"><div id="host-disk-bar" class="mini-stat-fill disk" style="width:0%"></div></div>
                    <span class="val" id="host-disk-val">0 GB</span>
                </div>
                <div class="mini-stats">
                    <span class="lbl">NET</span>
                    <span class="val" style="width:100%; text-align:right" id="host-net-val">0 ↓ | 0 ↑ MB/s</span>
                </div>

                <div id="gpu-metrics-container" style="display:none; margin-top:8px;">
                    <div class="mini-stats">
                        <span class="lbl">GPU USE</span>
                        <div class="mini-stat-bar"><div id="host-gpu-util-bar" class="mini-stat-fill gpu" style="width:0%;"></div></div>
                        <span class="val gpu" id="host-gpu-util-val">0%</span>
                    </div>
                    <div class="mini-stats" style="margin-bottom: 12px;">
                        <span class="lbl">GPU RAM</span>
                        <div class="mini-stat-bar"><div id="host-gpu-mem-bar" class="mini-stat-fill gpu" style="width:0%;"></div></div>
                        <span class="val gpu" id="host-gpu-mem-val">0 GB</span>
                    </div>
                </div>

                <button id="btn-export" class="btn btn-primary" style="width: 100%; margin-top: 15px;">🤖 AI DIAGNOSTIC</button>
                <button id="btn-prune" class="btn btn-danger" style="width: 100%; margin-top:8px;">♻️ SYSTEM PRUNE</button>
            </div>
        </aside>

        <main class="main-area">
            <header class="top-bar desktop-only">
                <div class="view-toggles">
                    <button id="btn-view-grid" class="view-btn active">SERVICES GRID</button>
                    <button id="btn-view-topology" class="view-btn">ARCHITECTURE MAP</button>
                </div>
                <div style="display:flex; align-items:center; gap:20px;">
                    <button id="btn-self-update" class="btn btn-info" style="font-size:9px;">🔄 UPDATE NEXUS</button>
                    <div style="font-size:11px; font-weight:bold; color:var(--accent-green); border:1px solid var(--accent-green-glow); padding:4px 10px; border-radius:4px; background:rgba(16,185,129,0.05);">GOVERNOR ACTIVE 👁️</div>
                    <div id="conn-status" class="conn-status offline">● OFFLINE</div>
                </div>
            </header>

            <div class="views-wrapper">
                <div id="view-grid" class="view-layer active">
                    <div class="mobile-only view-toggles" style="padding:10px 20px; border-bottom:1px solid var(--border-dim); width: 100%; justify-content: center;">
                        <button id="btn-view-grid-mobile" class="view-btn active" style="flex:1;">GRID</button>
                        <button id="btn-view-topology-mobile" class="view-btn" style="flex:1;">MAP</button>
                    </div>
                    <div id="services-grid" class="services-grid">
                        <div id="grid-loader" style="color:#666; font-family:'JetBrains Mono'; padding: 20px; grid-column: 1 / -1;">Awaiting telemetry from nodes...</div>
                    </div>
                </div>

                <div id="view-topology" class="view-layer">
                    <div id="topology-network"></div>
                    <div class="topo-controls">
                        <button id="btn-freeze-physics" class="btn">❄️ FREEZE LAYOUT</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div id="info-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-tabs">
                    <button class="tab-btn active" data-target="view-logs" id="tab-logs">LIVE TERMINAL</button>
                    <button class="tab-btn" data-target="view-inspect" id="tab-inspect">DOCKER INSPECT</button>
                    <button class="tab-btn" data-target="view-violations" id="tab-violations" style="color:var(--warn);">⚠️ VIOLATIONS</button>
                </div>
                <button class="icon-btn modal-close" id="btn-modal-close">✕</button>
            </div>
            
            <div id="view-logs" class="modal-view active">
                <div id="log-status" style="padding:10px; font-family:monospace; font-size:11px; color:#888;">Connecting to stream...</div>
                <div id="log-output" class="log-container" style="background:#000;"></div>
            </div>

            <div id="view-inspect" class="modal-view">
                <pre id="inspect-output" class="log-container" style="color:var(--accent-green);"></pre>
            </div>

            <div id="view-violations" class="modal-view">
                <div id="violations-output" class="log-container" style="color:var(--warn); font-size:13px; line-height:1.6;"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/ui/js/app.js"></script>
</body>
</html>
